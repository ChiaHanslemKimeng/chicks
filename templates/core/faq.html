{% extends 'base.html' %}

{% block title %}FAQs - Universal Poultry Farm{% endblock %}

{% block content %}
<section class="py-20 px-6 md:px-12 bg-slate-50 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-4xl font-bold text-slate-800 mb-12 text-center">Frequently Asked <span
                class="text-gold">Questions</span></h1>

        <div class="space-y-4">
            {% for faq in faqs %}
            <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-slate-100">
                <button class="w-full p-6 text-left flex justify-between items-center group"
                    onclick="this.nextElementSibling.classList.toggle('hidden')">
                    <span class="text-lg font-bold text-slate-800 group-hover:text-gold transition-colors">{{
                        faq.question }}</span>
                    <span class="text-gold">▼</span>
                </button>
                <div class="p-6 pt-0 text-slate-500 hidden border-t border-slate-50">
                    {{ faq.answer }}
                </div>
            </div>
            {% empty %}
            <div class="text-center py-12 bg-white rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-400 italic">No FAQs available yet. Check back later!</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
